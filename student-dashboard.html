<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Student Dashboard | PYQ & Notes</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body {
                background: #f1f5f9;
                min-height: 100vh;
            }

            .navbar-brand {
                font-weight: bold;
                font-size: 1.5rem;
            }

            .profile-pic {
                border-radius: 50%;
                width: 40px;
                height: 40px;
                object-fit: cover;
                margin-right: 10px;
            }

            .user-info {
                display: flex;
                align-items: center;
            }
        </style>
    </head>

    <body>
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">PYQ & Notes</a>
                <div class="ms-auto user-info">
                    <img id="profilePicture" class="profile-pic" src="" alt="Profile Picture">
                    <span id="userName" class="me-3">User Name</span>
                    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
                </div>
            </div>
        </nav>
        <div class="container mt-5">
            <div class="text-center">
                <h2>Welcome, <span id="welcomeName">Student</span>!</h2>
                <p>This is your student dashboard.</p>
            </div>
        </div>
        <script>
            function displayUserInfo() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (user) {
                    document.getElementById('userName').textContent = `${user.firstName} ${user.lastName}`;
                    document.getElementById('welcomeName').textContent = user.firstName;
                    document.getElementById('profilePicture').src = user.picture;
                } else {
                    window.location.href = "index.html";
                }
            }
            function logout() {
                localStorage.removeItem('user');
                window.location.href = "index.html";
            }
            window.onload = displayUserInfo;
        </script>
    </body>

</html>
